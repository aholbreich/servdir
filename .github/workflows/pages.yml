name: Deploy static site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Compute build version
        id: build_version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "value=pages-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build static site
        env:
          SERVDIR_BUILD_MODE: static
          SERVDIR_SITE_URL: https://aholbreich.github.io
          SERVDIR_BASE_PATH: /servdir
          LOCAL_CATALOG_PATH: ./catalog
          APP_BUILD_VERSION: ${{ steps.build_version.outputs.value }}
          BASIC_AUTH_ENABLED: false
        run: pnpm build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
